<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGS PLUS — Tableau de Bord</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  {% include 'layout.html' %}

  <div class="main">
    {% include 'topbar.html' %}

    <div class="page-content" id="page-dashboard">

      <div class="stat-grid">
        <div class="stat-card blue">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Total patients</span>
            <strong class="stat-val" id="s-total">—</strong>
          </div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Taux de guérison</span>
            <strong class="stat-val" id="s-guerison">—</strong>
          </div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Maladie fréquente</span>
            <strong class="stat-val sm" id="s-maladie">—</strong>
          </div>
        </div>
        <div class="stat-card red">
          <div class="stat-icon">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          </div>
          <div class="stat-info">
            <span class="stat-label">Taux de mortalité</span>
            <strong class="stat-val" id="s-mortalite">—</strong>
          </div>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-box">
          <div class="chart-title">Répartition par maladie</div>
          <div class="legend" id="leg-maladie"></div>
          <div class="chart-wrap h240"><canvas id="chartMaladie" role="img" aria-label="Graphique par maladie">Chargement...</canvas></div>
        </div>
        <div class="chart-box">
          <div class="chart-title">Répartition par sexe</div>
          <div class="legend" id="leg-sexe"></div>
          <div class="chart-wrap h240"><canvas id="chartSexe" role="img" aria-label="Graphique par sexe">Chargement...</canvas></div>
        </div>
        <div class="chart-box full">
          <div class="chart-title">Patients par tranche d'âge</div>
          <div class="legend" id="leg-age"></div>
          <div class="chart-wrap h200"><canvas id="chartAge" role="img" aria-label="Graphique par âge">Chargement...</canvas></div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script>initDashboard();</script>
</body>
</html>
