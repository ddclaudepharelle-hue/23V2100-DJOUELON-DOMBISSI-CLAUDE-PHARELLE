<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGS PLUS — Nouveau Patient</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  {% include 'layout.html' %}

  <div class="main">
    {% include 'topbar.html' %}

    <div class="page-content">
      <div class="card">
        <div class="form-title">Enregistrement d'un nouveau patient</div>

        <div class="form-grid">
          <div class="form-group">
            <label>Nom <span class="req">*</span></label>
            <input type="text" id="f-nom" placeholder="Ex: FOUDA">
          </div>
          <div class="form-group">
            <label>Prénom <span class="req">*</span></label>
            <input type="text" id="f-prenom" placeholder="Ex: Jean-Pierre">
          </div>
          <div class="form-group">
            <label>Date de naissance</label>
            <input type="date" id="f-ddn">
          </div>
          <div class="form-group">
            <label>Sexe <span class="req">*</span></label>
            <select id="f-sexe">
              <option value="">— Sélectionner —</option>
              <option>Masculin</option>
              <option>Féminin</option>
            </select>
          </div>
          <div class="form-group">
            <label>Téléphone</label>
            <input type="tel" id="f-tel" placeholder="6XXXXXXXX" maxlength="9">
          </div>
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" id="f-adresse" placeholder="Ex: Bastos, Yaoundé">
          </div>
          <div class="form-group">
            <label>Maladie diagnostiquée <span class="req">*</span></label>
            <select id="f-maladie">
              <option value="">— Sélectionner —</option>
              <option>Paludisme</option>
              <option>Typhoïde</option>
              <option>Tuberculose</option>
              <option>VIH/SIDA</option>
              <option>Choléra</option>
              <option>Diabète</option>
              <option>Hypertension</option>
              <option>Pneumonie</option>
              <option>Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label>Statut <span class="req">*</span></label>
            <select id="f-statut">
              <option value="">— Sélectionner —</option>
              <option>En traitement</option>
              <option>Guéri</option>
              <option>Décédé</option>
              <option>Référé</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Observations / Notes</label>
            <textarea id="f-obs" rows="3" placeholder="Symptômes, antécédents, traitements en cours..."></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-primary" onclick="submitPatient()">Enregistrer le patient</button>
          <button class="btn-ghost" onclick="resetForm()">Réinitialiser</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
