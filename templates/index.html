<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGS PLUS — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">

  <div class="login-wrap">
    <div class="login-left">
      <div class="brand-block">
        <div class="brand-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4L6 10v12c0 7.18 5.97 13.9 14 15.9 8.03-2 14-8.72 14-15.9V10L20 4z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
            <path d="M17 20h-3v-3h3v-3h6v3h3v3h-3v3h-6v-3z" fill="white"/>
          </svg>
        </div>
        <h1>Système de Gestion<br>Sanitaire</h1>
        <p>Gestion épidémiologique & suivi patient en temps réel</p>
      </div>
      <div class="login-decor">
        <div class="decor-circle c1"></div>
        <div class="decor-circle c2"></div>
        <div class="decor-circle c3"></div>
      </div>
    </div>

    <div class="login-right">
      <div class="form-card">
        <h2>Connexion</h2>
        <p class="subtitle" id="dateDisplay"></p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert-err">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
          <div class="field-group">
            <label>Nom d'utilisateur</label>
            <div class="input-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
              <input type="text" name="username" placeholder="Entrez votre identifiant" required autocomplete="username">
            </div>
          </div>
          <!-- <div class="field-group">
            <label>Mot de passe</label>
            <div class="input-wrap">
              <svg class="field-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
              <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div> -->
          <button type="submit" class="btn-login">Se connecter</button>
        </form>

        <p class="hint-text">Accès réservé au personnel de santé autorisé</p>
      </div>
    </div>
  </div>

  <script>
    const d = new Date();
    const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
    document.getElementById('dateDisplay').textContent = d.toLocaleDateString('fr-FR', opts);
  </script>
</body>
</html>
