<header class="topbar">
  <h2 class="page-title">
    {% if request.endpoint == 'dashboard' %}Tableau de bord
    {% elif request.endpoint == 'formulaire' %}Nouveau patient
    {% elif request.endpoint == 'liste_patients' %}Liste des patients
    {% else %}SGS PLUS{% endif %}
  </h2>
  <div class="user-chip">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    <div class="avatar">{{ user[0]|upper if user else 'A' }}</div>
    <span>{{ user or 'Admin' }}</span>
  </div>
</header>
